<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jarvis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <div class="brand">
            <span class="brand-dot"></span>
            <div>
              <h1>Jarvis</h1>
              <p>Personal AI Assistant</p>
            </div>
          </div>
          <button id="newChatButton" class="new-chat-button" type="button">+ New Chat</button>
        </div>

        <div class="sidebar-divider"></div>

        <div id="chatList" class="chat-list" aria-label="Conversation history"></div>
      </aside>

      <div id="sidebarOverlay" class="sidebar-overlay"></div>

      <section class="main-panel">
        <header class="topbar">
          <div class="topbar-left">
            <button
              id="menuToggle"
              class="icon-button mobile-only"
              type="button"
              aria-label="Toggle chat history"
              aria-expanded="false"
            >
              <span></span>
              <span></span>
              <span></span>
            </button>
            <div class="topbar-title">
              <h2 id="chatTitle">New Chat</h2>
              <p id="chatSubtitle">Persistent conversation history enabled</p>
            </div>
          </div>

          <button id="muteToggle" class="ghost-button" type="button" aria-pressed="false">
            <span class="button-icon">&#128266;</span>
            <span class="button-label">Voice On</span>
          </button>
        </header>

        <main id="chatContainer" class="chat-container" aria-live="polite"></main>

        <div id="typingIndicator" class="typing-indicator hidden">
          <div class="avatar-block">
            <div class="avatar">J</div>
            <div class="sound-wave passive">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
          <div class="typing-bubble">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>

        <form id="chatForm" class="input-bar">
          <label class="sr-only" for="messageInput">Message Jarvis</label>
          <textarea
            id="messageInput"
            placeholder="Ask Jarvis anything..."
            rows="1"
            autocomplete="off"
          ></textarea>
          <button id="sendButton" type="submit" class="send-button">Send</button>
        </form>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
